name: Build and Release

on:
  workflow_dispatch:
    inputs:
      create_nightly:
        description: 'Create nightly release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-15

    outputs:
      artifact: ${{ steps.upload-artifact.outputs.artifact }}

    steps:
      - name: Select latest Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Prepare workspace
        shell: bash
        run: |
          current="${GITHUB_WORKSPACE}"
          while [ -n "${current}" ] && [ "${current}" != "/" ]; do
            echo "::add-mask::${current}"
            current=$(dirname "${current}")
          done

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Checkout Firefox submodule
        run: git submodule update --init --depth 1 --recursive engine/firefox

      - name: Checkout idevice submodule
        run: git submodule update --init --depth 1 --recursive support/idevice

      - name: Get Firefox submodule hash
        id: firefox-hash
        run: echo "hash=$(git submodule status engine/firefox | awk '{print $1}' | tr -d '-+')" >> $GITHUB_OUTPUT

      - name: Patch mozconfig for CI linker
        run: |
          MOZCONFIG="engine/firefox/.mozconfig"
          if ! grep -q 'enable-linker' "$MOZCONFIG"; then
            echo '' >> "$MOZCONFIG"
            echo '# CI: explicitly select Apple ld to avoid linker detection failures' >> "$MOZCONFIG"
            echo 'ac_add_options --enable-linker=ld' >> "$MOZCONFIG"
          fi

      - name: Cache mozbuild
        uses: actions/cache@v4
        with:
          path: ~/.mozbuild
          key: mozbuild-${{ runner.os }}-${{ steps.firefox-hash.outputs.hash }}
          restore-keys: |
            mozbuild-${{ runner.os }}-

      - name: Update Gecko
        run: ./tools/development/update-gecko.sh

      - name: Apply Gecko patches
        run: ./tools/development/apply-patches.sh

      - name: Build idevice
        run: ./tools/development/build-idevice.sh

      - name: Build the app
        run: ./tools/release/build-app.sh

      - name: Create .ipa file
        run: ./tools/release/create-ipa.sh

      - name: Tar build artifact
        run: tar -czf ./dist/Reynard.xcarchive.tar.gz -C ./dist Reynard.xcarchive

      - name: Upload build artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.xcarchive
          path: ./dist/Reynard.xcarchive.tar.gz

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.ipa
          path: ./dist/Reynard.ipa

      - name: Clean up workspace
        if: always()
        shell: bash
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.create_nightly && github.event.inputs.create_nightly == 'true'
    permissions:
      contents: write

    steps:
      - name: Prepare workspace
        shell: bash
        run: |
          current="${GITHUB_WORKSPACE}"
          while [ -n "${current}" ] && [ "${current}" != "/" ]; do
            echo "::add-mask::${current}"
            current=$(dirname "${current}")
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Download .ipa artifact
        uses: actions/download-artifact@v4
        with:
          name: Reynard.ipa
          path: ./dist

      - name: Get information for release
        id: version
        run: |
          CURRENT_VERSION=$(grep 'CURRENT_VERSION' ./browser/Configuration/Reynard.xcconfig | cut -d '=' -f2 | tr -d ' ')
          CURRENT_BUILD=$(date +%Y%b%d | tr '[:lower:]' '[:upper:]')
          ENGINE_REVISION=$(cat ./engine/release.txt)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "current_build=$CURRENT_BUILD" >> $GITHUB_OUTPUT
          echo "engine_revision=$ENGINE_REVISION" >> $GITHUB_OUTPUT

      - name: Create nightly release
        uses: andelf/nightly-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            **Build:** ${{ steps.version.outputs.current_build }}
            **Version:** ${{ steps.version.outputs.current_version }}
            **Engine:** https://github.com/mozilla-firefox/firefox/commit/${{ steps.version.outputs.engine_revision }}
            **Commit:** https://github.com/${{ github.repository }}/commit/${{ github.sha }}

            Auto nightly build.

          files: |
            ./dist/Reynard.ipa

      - name: Clean up workspace
        if: always()
        shell: bash
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          fi
